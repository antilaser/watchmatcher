# Full-location reference (optional). Automated VPS flow: run
#   bash deploy/vps-deploy-dashboard-nginx.sh
# which installs snippets + patches your vhost (removes root -> :8000, adds include).
#
# Merge into the HTTPS server block that handles brimit.de / www.brimit.de.
# Problem: if `location /` proxies only to FastAPI, https://www.brimit.de/ returns {"detail":"Not Found"}.

upstream watchmatch_api {
    server 127.0.0.1:8000;
}

upstream watchmatch_dashboard {
    server 127.0.0.1:3000;
}

# Use inside: server { listen 443 ssl; server_name brimit.de www.brimit.de; ... }
# (Adjust ports if API_HOST_PORT / DASHBOARD_HOST_PORT differ on the host.)

location /api/v1/ {
    proxy_pass http://watchmatch_api/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /docs {
    proxy_pass http://watchmatch_api/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /openapi.json {
    proxy_pass http://watchmatch_api/openapi.json;
}

location /redoc {
    proxy_pass http://watchmatch_api/redoc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /health {
    proxy_pass http://watchmatch_api/health;
}

location / {
    proxy_pass http://watchmatch_dashboard;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
