# Location-only fragment for same-origin hosting (merge into your TLS server{}).
# Full example: deploy/nginx-https-same-origin.example.conf
# Replace any existing `location /` that pointed only at FastAPI.
# Dashboard: docker compose --profile dashboard up -d → 127.0.0.1:3000

upstream watchmatch_dashboard {
    server 127.0.0.1:3000;
}

# Proxy UI (adjust if you use a path prefix instead of /)
location / {
    proxy_pass http://watchmatch_dashboard;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# API must stay reachable (typical watchmatch paths)
location /api/v1/ {
    proxy_pass http://127.0.0.1:8000/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /docs {
    proxy_pass http://127.0.0.1:8000/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /openapi.json {
    proxy_pass http://127.0.0.1:8000/openapi.json;
}

location /health {
    proxy_pass http://127.0.0.1:8000/health;
}
