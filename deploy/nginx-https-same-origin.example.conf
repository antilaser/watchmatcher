# Full HTTPS server example: same host for UI (Next) and API (FastAPI).
# Copy pieces into your real config (Certbot may already own ssl_* lines — merge locations only).
#
# Prerequisites on the host:
#   - API on 127.0.0.1:8000 (or change upstream watchmatch_api)
#   - Dashboard: docker compose --profile dashboard up -d  → 127.0.0.1:3000
#   - Rebuild dashboard with NEXT_PUBLIC_API_BASE_URL unset/empty so the browser uses /api/v1

upstream watchmatch_api {
    server 127.0.0.1:8000;
}

upstream watchmatch_dashboard {
    server 127.0.0.1:3000;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/v1/ {
        proxy_pass http://watchmatch_api/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://watchmatch_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://watchmatch_api/openapi.json;
    }

    location /health {
        proxy_pass http://watchmatch_api/health;
    }

    location / {
        proxy_pass http://watchmatch_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}
