services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchmatch}
      POSTGRES_DB: ${POSTGRES_DB:-watchmatch}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchmatch}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Same-origin: leave NEXT_PUBLIC_API_BASE_URL out of .env (or empty). Browser uses https://<host>/api/v1.
  # Requires nginx: / → this service, /api/v1/ → api (see deploy/nginx-https-same-origin.example.conf).
  dashboard:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DASHBOARD_HOST_PORT:-3000}:3000"
    profiles: ["dashboard"]

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: arq app.workers.arq_worker.WorkerSettings

  whatsapp-ingest:
    build: ./ingest/whatsapp-baileys
    env_file: .env
    environment:
      WATCHMATCH_WEBHOOK_URL: http://api:8000/api/v1/ingest/webhook
      WATCHMATCH_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      WA_AUTH_DIR: /app/auth
    depends_on:
      api:
        condition: service_started
    volumes:
      - whatsapp_auth:/app/auth
    stdin_open: true
    tty: true
    restart: unless-stopped
    profiles: ["whatsapp"]

volumes:
  pgdata:
  whatsapp_auth:
